name: Build and Test on Linux and Windows

on:
  push:
    branches: [ master ]
    tags: "v*"

jobs:
  build:
    name: Test on ${{ matrix.config.os }}
    runs-on: ${{ matrix.config.os }}
    timeout-minutes: 1
    strategy:
      fail-fast: false
      matrix:
        config:
        - {os: ubuntu-latest}

    steps:
      - uses: actions/checkout@v6

      - name: Info
        run: echo ${{ github.ref }}

      - name: Run Tester
        run: ./tester.sh
